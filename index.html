<head>
    <meta charset="UTF-8">

    <title>내부 페이지 이동</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }
        .menu-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: #f1f3f5;
            color: #495057;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .nav-link:hover {
            background-color: #e9ecef;
            transform: translateX(5px);
            color: #007bff;
        }
        .nav-link::before {
            content: '📄';
            margin-right: 10px;
        }
    </style>
</head>
