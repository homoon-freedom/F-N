<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Work - 마음 기록 관리 도구</title>
    <!-- Google Fonts: Noto Sans KR 추가 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; background-color: #f8f9fa; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            color: #333; 
            line-height: 1.6; 
            font-size: 14px; 
        }
        .container { max-width: 800px; margin: 0 auto; padding: 14px 20px; box-sizing: border-box; background-color: #fff; min-height: 100vh; }
        @media (max-width: 600px) { .container { padding: 10px 10px; } }

        /* 탭 스타일 */
        .tabs { display: flex; gap: 5px; margin-bottom: 25px; border-bottom: 2px solid #eee; overflow-x: auto; position: sticky; top: 0; background: #fff; z-index: 10; }
        .tab-button { 
            padding: 12px 15px; 
            cursor: pointer; 
            border: none; 
            background: #eee; 
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px; 
            font-weight: 700; 
            border-radius: 8px 8px 0 0; 
            white-space: nowrap; 
            flex-shrink: 0; 
            transition: 0.3s; 
        }
        .tab-button.active { background: #2980b9; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 질문 그룹 스타일 */
        label { font-weight: 700; display: block; margin-bottom: 6px; color: #2980b9; font-size: 1.1em; letter-spacing: -0.02em; }
        .question-group { background: #fdfdfd; padding: 18px; border: 1px solid #edf2f7; border-left: 4px solid #2980b9; margin-bottom: 15px; border-radius: 0 10px 10px 0; }
        
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .btn-play { 
            background: #2980b9; color: white; border: none; border-radius: 50%; 
            width: 30px; height: 30px; cursor: pointer; font-size: 12px; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
            flex-shrink: 0; margin-left: 10px;
        }
        .btn-play:hover { background: #1a5276; transform: scale(1.1); }
        .btn-play.playing { background: #e74c3c; box-shadow: 0 0 8px rgba(231, 76, 60, 0.5); }

        textarea { 
            width: 100%; min-height: 60px; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; 
            resize: none; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif;
            font-size: 15px; line-height: 1.6; overflow: hidden; display: block; background-color: #fff; 
        }
        textarea:focus { outline: 2px solid #3498db; border-color: transparent; }
        
        .check-group { margin: 10px 0; display: flex; gap: 20px; align-items: center; }
        .check-group input { transform: scale(1.2); cursor: pointer; }
        .check-group label { display: inline; font-weight: 400; color: #555; margin-bottom: 0; cursor: pointer; font-size: 14px; }

        /* 기록 목록 스타일 */
        .record-item { border: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 10px; background: #fafafa; position: relative; }
        .record-date { font-size: 12px; color: #999; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .record-sub-title { font-weight: 700; color: #34495e; margin-top: 15px; display: block; font-size: 1.1em; border-left: 3px solid #34495e; padding-left: 8px; }
        .record-text { font-size: 14px; color: #444; margin: 8px 0; white-space: pre-wrap; padding-left: 10px; }

        .record-btns { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
        .record-btns button { background: none; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-del-item { color: #e74c3c; }
        .btn-edit-item { color: #2980b9; }

        /* 하단 버튼 */
        .buttons { display: flex; flex-direction: column; gap: 10px; margin: 30px 0; padding-bottom: 50px; align-items: center; }
        .main-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px; }
        button.action-btn { 
            padding: 14px; font-size: 14px; border-radius: 8px; cursor: pointer; border: none; 
            font-weight: 700; font-family: 'Noto Sans KR', sans-serif; transition: 0.2s; 
        }
        .btn-record { background-color: #27ae60; color: #fff; grid-column: span 2; font-size: 16px; } 
        .btn-share { background-color: #fee500; color: #3c1e1e; }
        .btn-reset { background-color: #e74c3c; color: #fff; }
        
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: #fff; z-index: 9999; justify-content: center; align-items: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading">이미지 생성 중... 잠시만 기다려주세요.</div>

<div class="container" id="capture-target">
    <header style="margin-bottom: 25px; text-align: center;">
        <h1 style="margin: 0; font-size: 1.6em; color: #2c3e50; font-weight: 700;">The Work (작업)</h1>
        <p style="margin: 5px 0; color: #7f8c8d; font-size: 0.95em;">자유로운 마음을 위한 네 가지 질문과 뒤집기</p>
    </header>

    <div class="tabs" id="tab-nav">
        <button class="tab-button active" id="btn-step6" onclick="openTab(event, 'step6')">1단계: 6가지 판단</button>
        <button class="tab-button" id="btn-step4" onclick="openTab(event, 'step4')">2단계: 4가지 질문</button>
        <button class="tab-button" id="record-tab-btn" onclick="openTab(event, 'record-list')">기록 목록(0)</button>
    </div>

    <!-- 1단계 -->
    <div id="step6" class="tab-content active">
        <div class="question-group"><label>1. 당신을 화나게 하거나 슬프게 하는 사람은 누구인가요?</label><textarea class="q-step1" oninput="autoResize(this)" placeholder="나는 (이름: ) 때문에 화가 난다..."></textarea></div>
        <div class="question-group"><label>2. 당신은 그 사람이 어떻게 바뀌기를 원하나요?</label><textarea class="q-step1" oninput="autoResize(this)" placeholder="나는 __이(가) __하기를 원한다."></textarea></div>
        <div class="question-group"><label>3. 그 사람이 해야 하거나 하지 말아야 할 것들은 무엇인가요?</label><textarea class="q-step1" oninput="autoResize(this)" placeholder="__는(은) 해야 한다..."></textarea></div>
        <div class="question-group"><label>4. 당신은 그 사람에게 무엇인가를 필요로 하나요?</label><textarea class="q-step1" oninput="autoResize(this)" placeholder="나는 __이(가) __기를 필요로 한다."></textarea></div>
        <div class="question-group"><label>5. 당신은 그 사람을 어떻게 생각하나요?</label><textarea class="q-step1" oninput="autoResize(this)" placeholder="__는(은) ____________."></textarea></div>
        <div class="question-group"><label>6. 다시는 경험하고 싶지 않은 점은 무엇인가요?</label><textarea class="q-step1" oninput="autoResize(this)" placeholder="나는 앞으로 다시는 ___하고 싶지 않다."></textarea></div>
    </div>

    <!-- 2단계 -->
    <div id="step4" class="tab-content">
        <div class="question-group" style="border-left-color: #7f8c8d;">
            <label style="color: #7f8c8d;">0. 조사할 문장</label>
            <textarea class="q-step2" oninput="autoResize(this)"></textarea>
        </div>
        <div class="question-group">
            <div class="q-header"><label>1. 그 생각이 진실인가요?</label><button class="btn-play" onclick="playAudio('1.mp3', this)">▶</button></div>
            <div class="check-group">
                <input type="radio" name="q1" id="q1y" value="예"><label for="q1y">예</label>
                <input type="radio" name="q1" id="q1n" value="아니오"><label for="q1n">아니오</label>
            </div>
            <textarea class="q-step2" oninput="autoResize(this)"></textarea>
        </div>
        <div class="question-group">
            <div class="q-header"><label>2. 그 생각이 진실이라는 것을 확실히 알 수 있나요?</label><button class="btn-play" onclick="playAudio('2.mp3', this)">▶</button></div>
            <div class="check-group">
                <input type="radio" name="q2" id="q2y" value="예"><label for="q2y">예</label>
                <input type="radio" name="q2" id="q2n" value="아니오"><label for="q2n">아니오</label>
            </div>
            <textarea class="q-step2" oninput="autoResize(this)"></textarea>
        </div>
        <div class="question-group">
            <div class="q-header"><label>3. 그 생각을 믿을 때 당신은 어떻게 반응하나요?</label><button class="btn-play" onclick="playAudio('3.mp3', this)">▶</button></div>
            <textarea class="q-step2" oninput="autoResize(this)"></textarea>
        </div>
        <div class="question-group">
            <div class="q-header"><label>4. 그 생각이 없다면 당신은 누구일까요?</label><button class="btn-play" onclick="playAudio('4.mp3', this)">▶</button></div>
            <textarea class="q-step2" oninput="autoResize(this)"></textarea>
        </div>
        <div class="question-group" style="border-left-color: #16a085;">
            <div class="q-header"><label style="color: #16a085;">5. 생각 뒤집기</label><button class="btn-play" style="background:#16a085;" onclick="playAudio('5.mp3', this)">▶</button></div>
            <textarea class="q-step2" oninput="autoResize(this)"></textarea>
        </div>
    </div>

    <!-- 기록 목록 -->
    <div id="record-list" class="tab-content">
        <div id="records-container" style="padding-top: 10px;"></div>
    </div>

    <!-- 하단 버튼 -->
    <div class="buttons" id="action-btns">
        <div class="main-btns">
            <button class="action-btn btn-record" id="main-save-btn" onclick="addRecord()">작업 내용 기록 및 저장하기</button>
            <button class="action-btn btn-share" onclick="shareAsImage()">이미지로 저장/공유</button>
            <button class="action-btn btn-reset" onclick="resetForm()">전체 초기화</button>
        </div>
    </div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('theWorkRecords')) || [];
    let currentAudio = null;
    let currentBtn = null;
    let editingId = null; // 수정 중인 기록의 ID를 저장

    window.onload = () => { updateRecordUI(); };

    function openTab(evt, tabName) {
        const tabcontent = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
        const tablinks = document.getElementsByClassName("tab-button");
        for (let i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        if(evt) evt.currentTarget.classList.add("active");
        else document.getElementById('record-tab-btn').classList.add("active");
        stopAllAudio();
    }

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';
    }

    function playAudio(fileUrl, btn) {
        if (currentAudio && !currentAudio.paused && currentBtn === btn) { stopAllAudio(); return; }
        stopAllAudio();
        currentAudio = new Audio(fileUrl);
        currentBtn = btn;
        currentAudio.play().catch(e => { alert("오디오 파일을 찾을 수 없습니다."); });
        btn.classList.add('playing');
        btn.innerText = '⏸';
        currentAudio.onended = () => { stopAllAudio(); };
    }

    function stopAllAudio() {
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (currentBtn) { currentBtn.classList.remove('playing'); currentBtn.innerText = '▶'; currentBtn = null; }
    }

    // 기록 추가 또는 수정
    function addRecord() {
        const step1Inputs = document.querySelectorAll('.q-step1');
        const step2Inputs = document.querySelectorAll('.q-step2');
        const q1Val = document.querySelector('input[name="q1"]:checked')?.value || "-";
        const q2Val = document.querySelector('input[name="q2"]:checked')?.value || "-";

        let hasData = false;
        [...step1Inputs, ...step2Inputs].forEach(el => { if(el.value.trim()) hasData = true; });
        if(!hasData) { alert("기록할 내용이 없습니다."); return; }

        const recordData = {
            id: editingId || Date.now(),
            date: editingId ? `(수정됨) ${new Date().toLocaleString()}` : new Date().toLocaleString(),
            step1: Array.from(step1Inputs).map(el => el.value),
            step2: Array.from(step2Inputs).map(el => el.value),
            checks: [q1Val, q2Val]
        };

        if (editingId) {
            // 수정 모드: 기존 인덱스 찾아 교체
            const index = records.findIndex(r => r.id === editingId);
            records[index] = recordData;
            editingId = null;
            document.getElementById('main-save-btn').innerText = "작업 내용 기록 및 저장하기";
            alert("수정되었습니다.");
        } else {
            // 신규 추가 모드
            records.unshift(recordData);
            alert("기록되었습니다.");
        }

        localStorage.setItem('theWorkRecords', JSON.stringify(records));
        clearInputs();
        updateRecordUI();
        openTab(null, 'record-list');
    }

    // 기록 수정 모드 진입
    function editRecord(id) {
        const record = records.find(r => r.id === id);
        if(!record) return;

        editingId = id;
        document.getElementById('main-save-btn').innerText = "수정 내용 반영하기 (저장)";

        // 값 채우기
        const step1Inputs = document.querySelectorAll('.q-step1');
        record.step1.forEach((val, i) => { 
            step1Inputs[i].value = val; 
            autoResize(step1Inputs[i]);
        });

        const step2Inputs = document.querySelectorAll('.q-step2');
        record.step2.forEach((val, i) => { 
            step2Inputs[i].value = val; 
            autoResize(step2Inputs[i]);
        });

        if(record.checks[0] === "예") document.getElementById('q1y').checked = true;
        else if(record.checks[0] === "아니오") document.getElementById('q1n').checked = true;

        if(record.checks[1] === "예") document.getElementById('q2y').checked = true;
        else if(record.checks[1] === "아니오") document.getElementById('q2n').checked = true;

        openTab(null, 'step6');
        window.scrollTo(0,0);
    }

    function clearInputs() {
        document.querySelectorAll('textarea').forEach(t => { t.value = ''; t.style.height = '60px'; });
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
    }

    function updateRecordUI() {
        const container = document.getElementById('records-container');
        document.getElementById('record-tab-btn').innerText = `기록 목록(${records.length})`;
        
        if (records.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: #999; margin-top:50px;">저장된 기록이 없습니다.</p>';
            return;
        }

        container.innerHTML = records.map((rec, idx) => `
            <div class="record-item">
                <div class="record-date">#${records.length - idx} - ${rec.date}</div>
                <div class="record-btns">
                    <button class="btn-edit-item" onclick="editRecord(${rec.id})">수정</button>
                    <button class="btn-del-item" onclick="deleteRecord(${rec.id})">삭제</button>
                </div>
                <span class="record-sub-title">1단계: 판단</span>
                ${rec.step1.map((val, i) => val ? `<div class="record-text">Q${i+1}: ${val}</div>` : '').join('')}
                <span class="record-sub-title">2단계: 조사</span>
                <div class="record-text"><strong>조사 문장:</strong> ${rec.step2[0] || ""}</div>
                <div class="record-text"><strong>Q1:</strong> [${rec.checks[0]}] ${rec.step2[1] || ""}</div>
                <div class="record-text"><strong>Q2:</strong> [${rec.checks[1]}] ${rec.step2[2] || ""}</div>
                <div class="record-text"><strong>Q3:</strong> ${rec.step2[3] || ""}</div>
                <div class="record-text"><strong>Q4:</strong> ${rec.step2[4] || ""}</div>
                <div class="record-text"><strong>뒤집기:</strong> ${rec.step2[5] || ""}</div>
            </div>
        `).join('');
    }

    function deleteRecord(id) {
        if(confirm("이 기록을 삭제할까요?")) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem('theWorkRecords', JSON.stringify(records));
            updateRecordUI();
        }
    }

    async function shareAsImage() {
        const loading = document.getElementById('loading');
        const target = document.getElementById('capture-target');
        const btns = document.getElementById('action-btns');
        const nav = document.getElementById('tab-nav');
        loading.style.display = 'flex';
        btns.style.display = 'none';
        nav.style.display = 'none';

        try {
            const canvas = await html2canvas(target, { scale: 2, backgroundColor: "#ffffff" });
            canvas.toBlob(async (blob) => {
                const file = new File([blob], "TheWork.png", { type: "image/png" });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'The Work 기록' });
                } else {
                    const link = document.createElement('a');
                    link.download = 'TheWork.png';
                    link.href = canvas.toDataURL();
                    link.click();
                }
            });
        } catch (err) { alert("오류가 발생했습니다."); }
        finally { loading.style.display = 'none'; btns.style.display = 'flex'; nav.style.display = 'flex'; }
    }

    function resetForm() {
        if(confirm("모든 기록을 삭제하고 초기화할까요?")) {
            clearInputs();
            records = [];
            editingId = null;
            localStorage.removeItem('theWorkRecords');
            updateRecordUI();
            openTab(null, 'step6');
        }
    }
</script>
